version: '3.8'
services:
  # Java App
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy # Only starts App after DB is fully ready
    networks:
      - pipeline_network

  # MySQL Database
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: mysql1234
      MYSQL_DATABASE: avgCalResults
    ports:
      - "3306:3306"
    networks:
      - pipeline_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  pipeline_network: